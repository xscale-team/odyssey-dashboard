<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Odyssey X — Product Roadmap</title>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a25;
    --border: #2a2a3a;
    --text: #e0e0e8;
    --text-dim: #8888a0;
    --gold: #f0b429;
    --gold-dim: #c99a1e;
    --green: #34d399;
    --red: #f87171;
    --blue: #60a5fa;
    --purple: #a78bfa;
    --cyan: #22d3ee;
    --amber: #fbbf24;
    --glass: rgba(255,255,255,0.04);
    --glass-border: rgba(255,255,255,0.08);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  .header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(10,10,15,0.9);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--glass-border);
    padding: 20px 32px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .header-left { display: flex; align-items: center; gap: 14px; }
  .header-logo {
    width: 40px; height: 40px; border-radius: 12px;
    background: linear-gradient(135deg, var(--gold), var(--gold-dim));
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 20px; color: #0a0a0f;
  }
  .header h1 {
    font-size: 22px; font-weight: 700;
    background: linear-gradient(135deg, var(--text), var(--gold));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .header-sub { font-size: 13px; color: var(--text-dim); margin-top: 2px; }
  .header-meta { font-size: 12px; color: var(--text-dim); display: flex; align-items: center; gap: 16px; }
  .live-dot {
    width: 8px; height: 8px; background: var(--green); border-radius: 50%;
    display: inline-block; animation: pulse 2s ease-in-out infinite; margin-right: 6px;
  }
  @keyframes pulse {
    0%,100% { opacity:1; box-shadow: 0 0 0 0 rgba(52,211,153,0.5); }
    50% { opacity:0.7; box-shadow: 0 0 0 6px rgba(52,211,153,0); }
  }

  /* Progress hero */
  .hero {
    padding: 32px;
    display: flex; gap: 24px; align-items: stretch; flex-wrap: wrap;
  }
  .hero-progress {
    flex: 1; min-width: 280px;
    background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
    padding: 28px; display: flex; flex-direction: column; justify-content: center;
  }
  .hero-progress .big-pct {
    font-size: 56px; font-weight: 800; color: var(--gold);
    line-height: 1;
  }
  .hero-progress .big-label {
    font-size: 16px; color: var(--text-dim); margin-top: 4px;
  }
  .progress-bar-outer {
    height: 8px; background: var(--glass); border-radius: 4px;
    overflow: hidden; margin-top: 16px;
  }
  .progress-bar-inner {
    height: 100%; border-radius: 4px;
    background: linear-gradient(90deg, var(--gold), var(--amber));
    transition: width 0.6s ease;
  }
  .hero-stats {
    display: flex; flex-direction: column; gap: 12px;
  }
  .hero-stat {
    background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
    padding: 16px 22px; min-width: 170px;
  }
  .hero-stat .label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-dim); }
  .hero-stat .val { font-size: 28px; font-weight: 700; margin-top: 2px; }
  .hero-stat .val.green { color: var(--green); }
  .hero-stat .val.blue { color: var(--blue); }
  .hero-stat .val.amber { color: var(--amber); }

  /* Section */
  .section { padding: 0 32px 32px; }
  .section-title {
    font-size: 18px; font-weight: 700; margin-bottom: 16px;
    display: flex; align-items: center; gap: 10px;
  }

  /* Feature cards */
  .features-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 14px;
  }
  .feature-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
    padding: 20px; transition: all 0.15s;
  }
  .feature-card:hover {
    border-color: rgba(255,255,255,0.12);
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(0,0,0,0.3);
  }
  .feature-card .feature-header {
    display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px;
  }
  .feature-card .feature-name {
    font-size: 15px; font-weight: 600;
  }
  .feature-card .feature-desc {
    font-size: 13px; color: var(--text-dim); line-height: 1.5;
  }
  .badge {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 10px; border-radius: 8px;
    font-size: 11px; font-weight: 600;
  }
  .badge.live { background: rgba(52,211,153,0.15); color: var(--green); }
  .badge.building { background: rgba(96,165,250,0.15); color: var(--blue); }
  .badge.planned { background: rgba(136,136,160,0.1); color: var(--text-dim); }
  .badge.fixing { background: rgba(251,191,36,0.15); color: var(--amber); }
  .badge .dot {
    width: 6px; height: 6px; border-radius: 50%;
  }
  .badge.live .dot { background: var(--green); }
  .badge.building .dot { background: var(--blue); }
  .badge.planned .dot { background: var(--text-dim); }
  .badge.fixing .dot { background: var(--amber); }

  /* Timeline */
  .timeline { display: flex; flex-direction: column; gap: 0; }
  .timeline-item {
    display: flex; gap: 16px; padding: 14px 0;
    border-bottom: 1px solid var(--glass-border);
  }
  .timeline-item:last-child { border-bottom: none; }
  .timeline-date {
    flex-shrink: 0; width: 100px;
    font-size: 12px; font-weight: 600; color: var(--gold); padding-top: 2px;
  }
  .timeline-content { flex: 1; }
  .timeline-content ul {
    list-style: none; font-size: 13px; color: var(--text-dim);
  }
  .timeline-content li { padding: 2px 0; padding-left: 16px; position: relative; }
  .timeline-content li::before { content: '→'; position: absolute; left: 0; color: var(--text-dim); }

  /* Coming soon */
  .coming-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 14px;
  }
  .coming-card {
    background: var(--glass); border: 1px solid var(--glass-border); border-radius: 14px;
    padding: 20px;
  }
  .coming-card .emoji { font-size: 28px; margin-bottom: 8px; }
  .coming-card .coming-name { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
  .coming-card .coming-desc { font-size: 13px; color: var(--text-dim); line-height: 1.5; }

  /* Dev activity cards */
  .dev-summary {
    display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 16px; width: 100%;
  }
  .dev-summary .hero-stat { flex: 1; min-width: 140px; }
  .session-cards { display: flex; gap: 14px; flex-wrap: wrap; width: 100%; }
  .session-card {
    flex: 1; min-width: 200px;
    background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
    padding: 18px; position: relative; overflow: hidden;
  }
  .session-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, var(--purple), var(--blue));
  }
  .session-card .session-date {
    font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 10px;
  }
  .session-card .session-time {
    font-size: 24px; font-weight: 800; color: var(--purple); margin-bottom: 4px;
  }
  .session-card .session-range {
    font-size: 11px; color: var(--text-dim); margin-bottom: 8px;
  }
  .session-card .session-meta {
    display: flex; gap: 12px; font-size: 12px; color: var(--text-dim);
  }
  .session-card .session-meta span { display: flex; align-items: center; gap: 4px; }

  /* Priority row */
  .priority-row {
    display: flex; gap: 24px; padding: 0 32px 8px;
    flex-wrap: wrap;
  }
  .priority-list {
    background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
    padding: 4px 0; max-height: 320px; overflow-y: auto;
  }
  .priority-item {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 12px 18px; border-bottom: 1px solid var(--glass-border);
    font-size: 13px; line-height: 1.5;
  }
  .priority-item:last-child { border-bottom: none; }
  .priority-num {
    flex-shrink: 0; width: 24px; height: 24px; border-radius: 8px;
    background: var(--glass); display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; color: var(--gold); margin-top: 1px;
  }
  .priority-item.bug .priority-num { color: var(--amber); }
  .priority-text { color: var(--text); }
  .priority-text strong { color: var(--text); font-weight: 600; }
  .priority-tag {
    display: inline-block; margin-left: 6px; padding: 1px 6px; border-radius: 4px;
    font-size: 10px; font-weight: 600; text-transform: uppercase;
  }
  .priority-tag.critical { background: rgba(248,113,113,0.15); color: var(--red); }
  .priority-tag.needs-verify { background: rgba(251,191,36,0.15); color: var(--amber); }

  @media (max-width: 700px) {
    .header { padding: 16px; }
    .hero { padding: 16px; }
    .section { padding: 0 16px 24px; }
    .features-grid, .coming-grid { grid-template-columns: 1fr; }
    .priority-row { padding: 0 16px 8px; flex-direction: column; }
  }
</style>
</head>

function parseRoadmap(content) {
  const phases = []; const bugs = []; const sessionLog = [];
  let currentSection = null;
  let currentPhase = null;
  let inSessionLog = false;

  for (const line of content.split('\n')) {
    const stripped = line.trim();

    // Detect major sections
    if (stripped === '## What\'s Done (Sessions 3-6)' || stripped.startsWith('## What\'s Done')) {
      currentPhase = { number: 1, name: 'Completed', sections: [], done: 0, total: 0 };
      phases.push(currentPhase); currentSection = null; inSessionLog = false;
    }
    else if (stripped.startsWith('## What\'s Next')) {
      currentPhase = { number: 2, name: 'Up Next', sections: [], done: 0, total: 0 };
      phases.push(currentPhase); currentSection = null; inSessionLog = false;
    }
    else if (stripped.startsWith('### Priority')) {
      // e.g. "### Priority 1: Ad Launch Pipeline (Agent → Meta)"
      const m = stripped.match(/### Priority \d+:\s*(.+)/);
      if (m && currentPhase) {
        currentSection = m[1];
        currentPhase.sections.push({ name: currentSection, items: [] });
      }
    }
    else if (stripped.startsWith('### ') && currentPhase) {
      currentSection = stripped.slice(4);
      currentPhase.sections.push({ name: currentSection, items: [] });
    }
    else if (stripped === '## Known Bugs & Technical Debt') {
      currentPhase = null; currentSection = 'bugs'; inSessionLog = false;
    }
    else if (stripped === '## Session Log') {
      currentPhase = null; currentSection = null; inSessionLog = true;
    }
    else if (stripped.startsWith('## Integration Status') || stripped.startsWith('## Deployment Status') || stripped.startsWith('## Architecture Notes')) {
      currentPhase = null; currentSection = null; inSessionLog = false;
    }
    else if (inSessionLog) {
      if (stripped.startsWith('### ')) sessionLog.push({ date: stripped.slice(4), items: [] });
      else if (stripped.startsWith('- ') && sessionLog.length > 0) sessionLog[sessionLog.length-1].items.push(stripped.slice(2));
    }
    else if (stripped.startsWith('- [x] ') || stripped.startsWith('- [ ] ')) {
      const done = stripped.startsWith('- [x]');
      const text = stripped.slice(6);
      if (currentSection === 'bugs') bugs.push({ text, done });
      else if (currentPhase) {
        if (currentPhase.sections.length > 0) currentPhase.sections[currentPhase.sections.length-1].items.push({ text, done });
        if (done) currentPhase.done++;
        currentPhase.total++;
      }
    }
  }
  return { phases, bugs, session_log: sessionLog };
}

// Translate dev bugs/tasks to marketer-friendly language
const TRANSLATIONS = {
  'Agent sometimes invents unsupported angles': { text: 'AI occasionally suggests off-brand angles — guardrails partially in place', tag: 'needs-verify' },
  'Shopify product fetch may miss products': { text: 'Some Shopify products may not sync (pagination fix applied, needs verify)', tag: 'needs-verify' },
  'Chat doesn\'t render ad images inline': { text: 'Ad images not displaying inline in chat messages' },
  'No Supabase Realtime subscriptions': { text: 'Task board requires manual refresh to see updates' },
  'Worker service deployed but not doing scheduled work': { text: 'Background worker running but no scheduled jobs yet' },
  'offer endpoints still use global': { text: 'Some data queries may bypass user permissions — fix in progress' },
  'Ad blocker blocks': { text: 'Ad blockers may interfere with some API calls — workaround applied' },
  'Loop sync rate limited': { text: 'Loop subscription sync can be slow with large accounts' },
  'offer_metrics_daily only populated on import': { text: 'Offer performance metrics not auto-updating daily from Meta yet' },
};

const NEXT_ITEMS = [
  { text: 'Ad Launch Pipeline — approve batch → auto-push to Meta Ads Manager', priority: 1 },
  { text: 'Wire Planner approval buttons to backend approve/reject endpoints', priority: 2 },
  { text: 'Watcher Agent — daily monitoring, kill losers, scale winners', priority: 3 },
  { text: 'Background Autonomy — agent creates its own daily/weekly tasks', priority: 4 },
  { text: 'Agent reads past performance data before generating new ads', priority: 5 },
  { text: 'User feedback on ads (thumbs up/down) informs future batches', priority: 6 },
  { text: 'Autonomy level controls (Supervised → Full Auto)', priority: 7 },
  { text: '"While you were gone" summary of agent actions', priority: 8 },
  { text: 'Guided onboarding flow (9 steps)', priority: 9 },
];

function render(data) {
  const totalDone = data.phases.reduce((s, p) => s + p.done, 0);
  const totalItems = data.phases.reduce((s, p) => s + p.total, 0);
  const pct = totalItems > 0 ? Math.round((totalDone / totalItems) * 100) : 0;

  document.getElementById('bigPct').textContent = pct + '%';
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('featuresLive').textContent = FEATURE_MAP.live.length;
  document.getElementById('featuresBuilding').textContent = FEATURE_MAP.building.length;
  document.getElementById('featuresPlanned').textContent = FEATURE_MAP.coming.length;

  // Dev Activity (from stats.json)
  renderDevActivity(data);

  // Up Next
  document.getElementById('upNextList').innerHTML = NEXT_ITEMS.map(item => `
    <div class="priority-item">
      <div class="priority-num">${item.priority}</div>
      <div class="priority-text">${esc(item.text)}</div>
    </div>
  `).join('');

  // Open Bugs — translate from roadmap data
  const openBugs = data.bugs.filter(b => !b.done);
  const translatedBugs = openBugs.map((bug, i) => {
    // Find a matching translation
    const key = Object.keys(TRANSLATIONS).find(k => bug.text.toLowerCase().includes(k.toLowerCase()));
    const translated = key ? TRANSLATIONS[key] : { text: bug.text };
    return { ...translated, num: i + 1 };
  });

  document.getElementById('openBugsList').innerHTML = translatedBugs.map(bug => `
    <div class="priority-item bug">
      <div class="priority-num">${bug.num}</div>
      <div class="priority-text">
        ${esc(bug.text)}
        ${bug.tag ? `<span class="priority-tag ${bug.tag}">${bug.tag === 'critical' ? '⚠ Critical' : '🔍 Needs Verify'}</span>` : ''}
      </div>
    </div>
  `).join('') || '<div class="priority-item"><div class="priority-text" style="color:var(--green)">No open bugs! 🎉</div></div>';

  // Live features
  document.getElementById('liveFeatures').innerHTML = FEATURE_MAP.live.map(f => `
    <div class="feature-card">
      <div class="feature-header">
        <span class="feature-name">${f.emoji} ${esc(f.name)}</span>
        <span class="badge live"><span class="dot"></span>Live</span>
      </div>
      <div class="feature-desc">${esc(f.desc)}</div>
    </div>
  `).join('');

  // Building features
  document.getElementById('buildingFeatures').innerHTML = FEATURE_MAP.building.map(f => `
    <div class="feature-card">
      <div class="feature-header">
        <span class="feature-name">${f.emoji} ${esc(f.name)}</span>
        <span class="badge building"><span class="dot"></span>Building</span>
      </div>
      <div class="feature-desc">${esc(f.desc)}</div>
    </div>
  `).join('');

  // Coming soon
  document.getElementById('comingFeatures').innerHTML = FEATURE_MAP.coming.map(f => `
    <div class="coming-card">
      <div class="emoji">${f.emoji}</div>
      <div class="coming-name">${esc(f.name)}</div>
      <div class="coming-desc">${esc(f.desc)}</div>
    </div>
  `).join('');

  // Recent updates (from session log — human-friendly)
  const recentEl = document.getElementById('recentUpdates');
  // Simplify session log items — filter out dev-only entries
  const devTerms = ['migration', 'CLAUDE.md', 'ROADMAP.md', 'TypeScript', 'tsc', 'HANDOFF', 'git', 'Docker', 'Railway', 'Cloudflare', 'path resolution', 'router', 'registry', 'Pydantic', 'schema', 'MASTER-PLAN', 'column mismatch', 'CHECK constraint', 'dev-dashboard', 'sync-dashboard'];

  const cleanSessions = data.session_log.map(session => {
    const cleanItems = session.items.filter(item => {
      return !devTerms.some(term => item.toLowerCase().includes(term.toLowerCase()));
    }).map(item => {
      // Simplify language
      return item
        .replace(/sandbox executor/gi, 'AI system')
        .replace(/Supabase/gi, 'database')
        .replace(/SSE streaming/gi, 'live streaming')
        .replace(/kanban/gi, 'task board');
    });
    return { date: session.date.replace(/\(Session \d+\)/, '').trim(), items: cleanItems };
  }).filter(s => s.items.length > 0);

  if (cleanSessions.length > 0) {
    recentEl.innerHTML = `<div class="timeline">
      ${cleanSessions.map(s => `
        <div class="timeline-item">
          <div class="timeline-date">${esc(s.date)}</div>
          <div class="timeline-content">
            <ul>${s.items.map(i => `<li>${esc(i)}</li>`).join('')}</ul>
          </div>
        </div>
      `).join('')}
    </div>`;
  } else {
    recentEl.innerHTML = '<div style="text-align:center;padding:20px;color:var(--text-dim);">Updates will appear here as features ship.</div>';
  }
}

function esc(str) { const d = document.createElement('div'); d.textContent = str; return d.innerHTML; }

function formatDate(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
}

function formatTime12(timeStr) {
  const [h, m] = timeStr.split(':');
  const hr = parseInt(h);
  const ampm = hr >= 12 ? 'PM' : 'AM';
  const hr12 = hr % 12 || 12;
  return `${hr12}:${m} ${ampm} EST`;
}

function renderDevActivity(data) {
  const el = document.getElementById('devActivity');
  if (!window._statsData) {
    el.innerHTML = '<div style="color:var(--text-dim);font-size:13px;">Loading git stats...</div>';
    return;
  }
  const stats = window._statsData;

  el.innerHTML = `
    <div class="dev-summary">
      <div class="hero-stat">
        <div class="label">Total Dev Time</div>
        <div class="val" style="color:var(--purple);">${stats.total_hours}h</div>
      </div>
      <div class="hero-stat">
        <div class="label">Sessions</div>
        <div class="val" style="color:var(--purple);">${stats.sessions.length}</div>
      </div>
      <div class="hero-stat">
        <div class="label">Commits</div>
        <div class="val" style="color:var(--cyan);">${stats.total_commits}</div>
      </div>
      <div class="hero-stat">
        <div class="label">Lines Written</div>
        <div class="val" style="color:var(--green);">${((stats.total_lines_added || 0) / 1000).toFixed(0)}K</div>
      </div>
    </div>
    <div class="session-cards">
      ${stats.sessions.map((s, i) => `
        <div class="session-card">
          <div class="session-date">${formatDate(s.date)}</div>
          <div class="session-time">${s.hours}h</div>
          <div class="session-range">${formatTime12(s.start)} → ${formatTime12(s.end)}</div>
          <div class="session-meta">
            <span>📝 ${s.commits} commits</span>
          </div>
        </div>
      `).join('')}
    </div>
  `;
}

let lastRaw = '';
async function fetchStats() {
  try {
    const statsUrl = isGitHubPages
      ? 'https://raw.githubusercontent.com/xscale-team/odyssey-dashboard/main/stats.json?t=' + Date.now()
      : '/api/stats';
    const resp = await fetch(statsUrl);
    if (resp.ok) {
      window._statsData = await resp.json();
    }
  } catch(e) { console.warn('Stats fetch failed:', e); }
}

async function fetchData() {
  try {
    await fetchStats();
    let content;
    if (isGitHubPages) {
      const resp = await fetch(GITHUB_RAW_URL + '?t=' + Date.now());
      content = await resp.text();
    } else {
      const resp = await fetch(LOCAL_API);
      const json = await resp.json();
      render(json);
      document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString();
      return;
    }
    if (content !== lastRaw) {
      lastRaw = content;
      render(parseRoadmap(content));
    }
    document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString();
  } catch(e) { console.error(e); }
}

fetchData();
setInterval(fetchData, REFRESH_INTERVAL);

</script>
