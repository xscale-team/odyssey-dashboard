<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Odyssey X — Product Roadmap</title>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a25;
    --border: #2a2a3a;
    --text: #e0e0e8;
    --text-dim: #8888a0;
    --gold: #f0b429;
    --gold-dim: #c99a1e;
    --green: #34d399;
    --red: #f87171;
    --blue: #60a5fa;
    --purple: #a78bfa;
    --cyan: #22d3ee;
    --amber: #fbbf24;
    --glass: rgba(255,255,255,0.04);
    --glass-border: rgba(255,255,255,0.08);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  .header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(10,10,15,0.9);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--glass-border);
    padding: 20px 32px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .header-left { display: flex; align-items: center; gap: 14px; }
  .header-logo {
    width: 40px; height: 40px; border-radius: 12px;
    background: linear-gradient(135deg, var(--gold), var(--gold-dim));
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 20px; color: #0a0a0f;
  }
  .header h1 {
    font-size: 22px; font-weight: 700;
    background: linear-gradient(135deg, var(--text), var(--gold));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .header-sub { font-size: 13px; color: var(--text-dim); margin-top: 2px; }
  .header-meta { font-size: 12px; color: var(--text-dim); display: flex; align-items: center; gap: 16px; }
  .live-dot {
    width: 8px; height: 8px; background: var(--green); border-radius: 50%;
    display: inline-block; animation: pulse 2s ease-in-out infinite; margin-right: 6px;
  }
  @keyframes pulse {
    0%,100% { opacity:1; box-shadow: 0 0 0 0 rgba(52,211,153,0.5); }
    50% { opacity:0.7; box-shadow: 0 0 0 6px rgba(52,211,153,0); }
  }

  /* Progress hero */
  .hero {
    padding: 32px;
    display: flex; gap: 24px; align-items: stretch; flex-wrap: wrap;
  }
  .hero-progress {
    flex: 1; min-width: 280px;
    background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
    padding: 28px; display: flex; flex-direction: column; justify-content: center;
  }
  .hero-progress .big-pct {
    font-size: 56px; font-weight: 800; color: var(--gold);
    line-height: 1;
  }
  .hero-progress .big-label {
    font-size: 16px; color: var(--text-dim); margin-top: 4px;
  }
  .progress-bar-outer {
    height: 8px; background: var(--glass); border-radius: 4px;
    overflow: hidden; margin-top: 16px;
  }
  .progress-bar-inner {
    height: 100%; border-radius: 4px;
    background: linear-gradient(90deg, var(--gold), var(--amber));
    transition: width 0.6s ease;
  }
  .hero-stats {
    display: flex; flex-direction: column; gap: 12px;
  }
  .hero-stat {
    background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
    padding: 16px 22px; min-width: 170px;
  }
  .hero-stat .label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-dim); }
  .hero-stat .val { font-size: 28px; font-weight: 700; margin-top: 2px; }
  .hero-stat .val.green { color: var(--green); }
  .hero-stat .val.blue { color: var(--blue); }
  .hero-stat .val.amber { color: var(--amber); }

  /* Section */
  .section { padding: 0 32px 32px; }
  .section-title {
    font-size: 18px; font-weight: 700; margin-bottom: 16px;
    display: flex; align-items: center; gap: 10px;
  }

  /* Feature cards */
  .features-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 14px;
  }
  .feature-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
    padding: 20px; transition: all 0.15s;
  }
  .feature-card:hover {
    border-color: rgba(255,255,255,0.12);
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(0,0,0,0.3);
  }
  .feature-card .feature-header {
    display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px;
  }
  .feature-card .feature-name {
    font-size: 15px; font-weight: 600;
  }
  .feature-card .feature-desc {
    font-size: 13px; color: var(--text-dim); line-height: 1.5;
  }
  .badge {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 10px; border-radius: 8px;
    font-size: 11px; font-weight: 600;
  }
  .badge.live { background: rgba(52,211,153,0.15); color: var(--green); }
  .badge.building { background: rgba(96,165,250,0.15); color: var(--blue); }
  .badge.planned { background: rgba(136,136,160,0.1); color: var(--text-dim); }
  .badge.fixing { background: rgba(251,191,36,0.15); color: var(--amber); }
  .badge .dot {
    width: 6px; height: 6px; border-radius: 50%;
  }
  .badge.live .dot { background: var(--green); }
  .badge.building .dot { background: var(--blue); }
  .badge.planned .dot { background: var(--text-dim); }
  .badge.fixing .dot { background: var(--amber); }

  /* Timeline */
  .timeline { display: flex; flex-direction: column; gap: 0; }
  .timeline-item {
    display: flex; gap: 16px; padding: 14px 0;
    border-bottom: 1px solid var(--glass-border);
  }
  .timeline-item:last-child { border-bottom: none; }
  .timeline-date {
    flex-shrink: 0; width: 100px;
    font-size: 12px; font-weight: 600; color: var(--gold); padding-top: 2px;
  }
  .timeline-content { flex: 1; }
  .timeline-content ul {
    list-style: none; font-size: 13px; color: var(--text-dim);
  }
  .timeline-content li { padding: 2px 0; padding-left: 16px; position: relative; }
  .timeline-content li::before { content: '→'; position: absolute; left: 0; color: var(--text-dim); }

  /* Coming soon */
  .coming-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 14px;
  }
  .coming-card {
    background: var(--glass); border: 1px solid var(--glass-border); border-radius: 14px;
    padding: 20px;
  }
  .coming-card .emoji { font-size: 28px; margin-bottom: 8px; }
  .coming-card .coming-name { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
  .coming-card .coming-desc { font-size: 13px; color: var(--text-dim); line-height: 1.5; }

  /* Priority row */
  .priority-row {
    display: flex; gap: 24px; padding: 0 32px 8px;
    flex-wrap: wrap;
  }
  .priority-list {
    background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
    padding: 4px 0; max-height: 320px; overflow-y: auto;
  }
  .priority-item {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 12px 18px; border-bottom: 1px solid var(--glass-border);
    font-size: 13px; line-height: 1.5;
  }
  .priority-item:last-child { border-bottom: none; }
  .priority-num {
    flex-shrink: 0; width: 24px; height: 24px; border-radius: 8px;
    background: var(--glass); display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; color: var(--gold); margin-top: 1px;
  }
  .priority-item.bug .priority-num { color: var(--amber); }
  .priority-text { color: var(--text); }
  .priority-text strong { color: var(--text); font-weight: 600; }
  .priority-tag {
    display: inline-block; margin-left: 6px; padding: 1px 6px; border-radius: 4px;
    font-size: 10px; font-weight: 600; text-transform: uppercase;
  }
  .priority-tag.critical { background: rgba(248,113,113,0.15); color: var(--red); }
  .priority-tag.needs-verify { background: rgba(251,191,36,0.15); color: var(--amber); }

  @media (max-width: 700px) {
    .header { padding: 16px; }
    .hero { padding: 16px; }
    .section { padding: 0 16px 24px; }
    .features-grid, .coming-grid { grid-template-columns: 1fr; }
    .priority-row { padding: 0 16px 8px; flex-direction: column; }
  }
</style>
</head>

function parseRoadmap(content) {
  const phases = []; const bugs = []; const quickStatus = [];
  const sessionLog = []; const whatNext = [];
  let currentPhase = null, currentSection = null;
  let inSessionLog = false, inWhatNext = false;

  for (const line of content.split('\n')) {
    const stripped = line.trim();
    if (stripped.startsWith('## Phase')) {
      inSessionLog = false; inWhatNext = false;
      const m = stripped.match(/## Phase (\d+):\s*(.+)/);
      if (m) { currentPhase = { number: parseInt(m[1]), name: m[2], sections: [], done: 0, total: 0 }; phases.push(currentPhase); currentSection = null; }
    }
    else if (stripped.startsWith('### ') && currentPhase) {
      currentSection = stripped.slice(4);
      currentPhase.sections.push({ name: currentSection, items: [] });
    }
    else if (stripped === '## Known Bugs & Technical Debt') { currentPhase = null; currentSection = 'bugs'; inSessionLog = false; inWhatNext = false; }
    else if (stripped === '## Session Log') { currentPhase = null; currentSection = null; inSessionLog = true; inWhatNext = false; }
    else if (stripped === '## What To Do Next') { currentPhase = null; currentSection = null; inSessionLog = false; inWhatNext = true; }
    else if (inSessionLog) {
      if (stripped.startsWith('### ')) sessionLog.push({ date: stripped.slice(4), items: [] });
      else if (stripped.startsWith('- ') && sessionLog.length > 0) sessionLog[sessionLog.length-1].items.push(stripped.slice(2));
    }
    else if (stripped.startsWith('- [x] ') || stripped.startsWith('- [ ] ')) {
      const done = stripped.startsWith('- [x]');
      const text = stripped.slice(6);
      if (currentSection === 'bugs') bugs.push({ text, done });
      else if (currentPhase) {
        if (currentPhase.sections.length > 0) currentPhase.sections[currentPhase.sections.length-1].items.push({ text, done });
        if (done) currentPhase.done++;
        currentPhase.total++;
      }
    }
  }
  return { phases, bugs, session_log: sessionLog };
}

// Translate dev bugs/tasks to marketer-friendly language
const TRANSLATIONS = {
  'Chat freezes 2-3+ minutes during ad generation': { text: 'Chat goes quiet during long tasks — no progress updates shown', tag: 'critical' },
  'Images may still disappear after streaming ends': { text: 'Generated ad images sometimes vanish after the chat loads', tag: 'needs-verify' },
  'Ads may still lack product photos composited in': { text: 'Some generated ads missing the actual product photo', tag: 'needs-verify' },
  'Team page Three Pillars shows placeholder values': { text: 'CPA / AOV / LTV metrics on Team page showing placeholder data' },
  'Team page stats cards show placeholder values': { text: 'Team member stats (tasks, cost) showing placeholder numbers' },
  'Team page agent status is static': { text: 'Team member statuses not updating in real-time' },
  'Chat page doesn\'t render generated ad images': { text: 'Ad images not displaying inline in the chat' },
  'Planner approval cards not wired': { text: 'Approve/Reject buttons on task cards not functional yet' },
  'No error handling in cockpit store': { text: 'Asset Cockpit needs better error messages' },
  'Worker service not deployed': { text: 'Background task runner not deployed yet' },
  'No Supabase Realtime subscriptions': { text: 'Task board doesn\'t update in real-time (requires refresh)' },
  'Offer metrics view will show empty': { text: 'Offer performance metrics not syncing from Meta yet' },
};

const NEXT_ITEMS = [
  { text: 'Wire Team page to real performance data', priority: 1 },
  { text: 'Make Approve/Reject buttons work on task cards', priority: 2 },
  { text: 'Test full flow: Chat → generate ads → view in Cockpit → approve', priority: 3 },
  { text: 'Live task updates without refreshing the page', priority: 4 },
  { text: 'Build remaining AI team SOPs (landing pages, email, monitoring)', priority: 5 },
  { text: 'Auto-generate Brand Brain from Shopify store data', priority: 6 },
  { text: 'Deploy background task runner for scheduled work', priority: 7 },
  { text: 'Daily ad metrics sync from Meta Ads', priority: 8 },
  { text: '"While you were gone" — catch-up summary when you log in', priority: 9 },
];

function render(data) {
  const totalDone = data.phases.reduce((s, p) => s + p.done, 0);
  const totalItems = data.phases.reduce((s, p) => s + p.total, 0);
  const pct = totalItems > 0 ? Math.round((totalDone / totalItems) * 100) : 0;

  document.getElementById('bigPct').textContent = pct + '%';
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('featuresLive').textContent = FEATURE_MAP.live.length;
  document.getElementById('featuresBuilding').textContent = FEATURE_MAP.building.length;
  document.getElementById('featuresPlanned').textContent = FEATURE_MAP.coming.length;

  // Up Next
  document.getElementById('upNextList').innerHTML = NEXT_ITEMS.map(item => `
    <div class="priority-item">
      <div class="priority-num">${item.priority}</div>
      <div class="priority-text">${esc(item.text)}</div>
    </div>
  `).join('');

  // Open Bugs — translate from roadmap data
  const openBugs = data.bugs.filter(b => !b.done);
  const translatedBugs = openBugs.map((bug, i) => {
    // Find a matching translation
    const key = Object.keys(TRANSLATIONS).find(k => bug.text.toLowerCase().includes(k.toLowerCase()));
    const translated = key ? TRANSLATIONS[key] : { text: bug.text };
    return { ...translated, num: i + 1 };
  });

  document.getElementById('openBugsList').innerHTML = translatedBugs.map(bug => `
    <div class="priority-item bug">
      <div class="priority-num">${bug.num}</div>
      <div class="priority-text">
        ${esc(bug.text)}
        ${bug.tag ? `<span class="priority-tag ${bug.tag}">${bug.tag === 'critical' ? '⚠ Critical' : '🔍 Needs Verify'}</span>` : ''}
      </div>
    </div>
  `).join('') || '<div class="priority-item"><div class="priority-text" style="color:var(--green)">No open bugs! 🎉</div></div>';

  // Live features
  document.getElementById('liveFeatures').innerHTML = FEATURE_MAP.live.map(f => `
    <div class="feature-card">
      <div class="feature-header">
        <span class="feature-name">${f.emoji} ${esc(f.name)}</span>
        <span class="badge live"><span class="dot"></span>Live</span>
      </div>
      <div class="feature-desc">${esc(f.desc)}</div>
    </div>
  `).join('');

  // Building features
  document.getElementById('buildingFeatures').innerHTML = FEATURE_MAP.building.map(f => `
    <div class="feature-card">
      <div class="feature-header">
        <span class="feature-name">${f.emoji} ${esc(f.name)}</span>
        <span class="badge building"><span class="dot"></span>Building</span>
      </div>
      <div class="feature-desc">${esc(f.desc)}</div>
    </div>
  `).join('');

  // Coming soon
  document.getElementById('comingFeatures').innerHTML = FEATURE_MAP.coming.map(f => `
    <div class="coming-card">
      <div class="emoji">${f.emoji}</div>
      <div class="coming-name">${esc(f.name)}</div>
      <div class="coming-desc">${esc(f.desc)}</div>
    </div>
  `).join('');

  // Recent updates (from session log — human-friendly)
  const recentEl = document.getElementById('recentUpdates');
  // Simplify session log items — filter out dev-only entries
  const devTerms = ['migration', 'CLAUDE.md', 'ROADMAP.md', 'TypeScript', 'tsc', 'HANDOFF', 'git', 'Docker', 'Railway', 'Cloudflare', 'path resolution', 'router', 'registry', 'Pydantic', 'schema', 'MASTER-PLAN', 'column mismatch', 'CHECK constraint', 'dev-dashboard', 'sync-dashboard'];

  const cleanSessions = data.session_log.map(session => {
    const cleanItems = session.items.filter(item => {
      return !devTerms.some(term => item.toLowerCase().includes(term.toLowerCase()));
    }).map(item => {
      // Simplify language
      return item
        .replace(/sandbox executor/gi, 'AI system')
        .replace(/Supabase/gi, 'database')
        .replace(/SSE streaming/gi, 'live streaming')
        .replace(/kanban/gi, 'task board');
    });
    return { date: session.date.replace(/\(Session \d+\)/, '').trim(), items: cleanItems };
  }).filter(s => s.items.length > 0);

  if (cleanSessions.length > 0) {
    recentEl.innerHTML = `<div class="timeline">
      ${cleanSessions.map(s => `
        <div class="timeline-item">
          <div class="timeline-date">${esc(s.date)}</div>
          <div class="timeline-content">
            <ul>${s.items.map(i => `<li>${esc(i)}</li>`).join('')}</ul>
          </div>
        </div>
      `).join('')}
    </div>`;
  } else {
    recentEl.innerHTML = '<div style="text-align:center;padding:20px;color:var(--text-dim);">Updates will appear here as features ship.</div>';
  }
}

function esc(str) { const d = document.createElement('div'); d.textContent = str; return d.innerHTML; }

let lastRaw = '';
async function fetchData() {
  try {
    let content;
    if (isGitHubPages) {
      const resp = await fetch(GITHUB_RAW_URL + '?t=' + Date.now());
      content = await resp.text();
    } else {
      const resp = await fetch(LOCAL_API);
      const json = await resp.json();
      // For local mode, reconstruct — but we just re-render with same feature map
      render(json);
      document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString();
      return;
    }
    if (content !== lastRaw) {
      lastRaw = content;
      render(parseRoadmap(content));
    }
    document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString();
  } catch(e) { console.error(e); }
}

fetchData();
setInterval(fetchData, REFRESH_INTERVAL);
</script>
